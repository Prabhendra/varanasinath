<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASHI – Official</title>
    <style>
/* ========== UNIVERSAL RESET ========== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #ffffff;
    height: 200vh;
}

/* ========== NAVIGATION BAR ========== */
.nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 35px;
    background: linear-gradient(to bottom, #2b2b2b, #0f0f0f);
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(8px);
    z-index: 1000;
}

.logo {
    font-size: 27px;
    letter-spacing: 8px;
    font-weight: 600;
    color: white;
}

.nav-center {
    display: flex;
    gap: 30px;
    position: relative;
}

.nav-center a {
    color: white;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    padding: 8px 10px;
    transition: .3s;
}

.nav-center a:hover {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 5px;
}

.nav-right {
    display: flex;
    gap: 18px;
}

.icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    transition: 0.3s;
}

.icon-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
}

.icon-btn svg {
    width: 22px;
    height: 22px;
}

.content {
    margin-top: 100px;
}

/* ========== MODAL STYLING ========== */
.modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
}

.modal.show {
    display: flex;
}

.modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(2px);
}

.modal-panel {
    position: relative;
    width: min(1400px, 100vw - 40px);
    max-height: calc(100vh - 80px);
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    padding: 28px 32px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #e5e5e5;
}

.modal-header h2 {
    font-size: 22px;
    font-weight: 600;
    margin: 0;
    color: #1a1a1a;
}

.close-btn {
    background: transparent;
    border: none;
    font-size: 32px;
    line-height: 1;
    cursor: pointer;
    color: #666;
    transition: color 0.2s ease;
    padding: 0;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.close-btn:hover {
    color: #000;
}

.modal-content {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 28px;
    overflow-y: auto;
    padding-right: 8px;
}

.modal-content::-webkit-scrollbar {
    width: 6px;
}

.modal-content::-webkit-scrollbar-track {
    background: #f0f0f0;
    border-radius: 10px;
}

.modal-content::-webkit-scrollbar-thumb {
    background: #d0d0d0;
    border-radius: 10px;
}

.modal-content::-webkit-scrollbar-thumb:hover {
    background: #999;
}

.region-column h3 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0 0 12px;
    color: #666;
}

.country {
    display: block;
    width: 100%;
    text-align: left;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 6px;
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    line-height: 1.5;
    color: #1a1a1a;
    transition: all 0.15s ease;
    font-family: inherit;
    position: relative;
    z-index: 10;
}

.country:focus {
    outline: none;
}

.country span {
    display: block;
    font-size: 12px;
    color: #888;
    margin-top: 2px;
    pointer-events: none;
}

.country:hover {
    background: #f5f5f5;
    border-color: #e0e0e0;
}

.country:active {
    transform: scale(0.98);
}

.country.active {
    background: #0066cc;
    border-color: #0066cc;
    color: #ffffff;
    font-weight: 600;
}

.country.active span {
    color: #e6f0ff;
}

.country.active.india-lang {
    background: #FF9500;
    border-color: #FF9500;
    color: #ffffff;
    font-weight: 600;
}

/* ========== RESPONSIVE DESIGN ========== */
@media (max-width: 1200px) {
    .modal-content {
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
    }
}

@media (max-width: 768px) {
    .modal-content {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }
}

@media (max-width: 640px) {
    .modal-panel {
        width: 100%;
        height: 100%;
        max-height: none;
        border-radius: 0;
        padding: 20px;
    }
    .modal-header {
        margin-bottom: 16px;
    }
    .modal-content {
        grid-template-columns: 1fr;
        gap: 16px;
    }
    .modal-header h2 {
        font-size: 18px;
    }
    .nav-center {
        gap: 15px;
    }
    .nav-center a {
        font-size: 12px;
    }
}

/* ========== MEGA DROPDOWN (SHOP) ========== */
.mega-dropdown-wrapper {
    position: fixed;
    left: 0;
    right: 0;
    top: 62px;
    display: flex;
    justify-content: center;
    pointer-events: none;
    z-index: 1500;
}

.mega-dropdown {
    width: 100%;
    max-width: 1200px;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.2);
    padding: 18px 24px 22px;
    opacity: 0;
    transform: translateY(10px);
    visibility: hidden;
    transition: opacity 220ms ease, transform 220ms ease, visibility 0s linear 220ms;
    pointer-events: none;
}

.mega-dropdown.is-open {
    opacity: 1;
    transform: translateY(0);
    visibility: visible;
    transition: opacity 220ms ease, transform 220ms ease, visibility 0s;
    pointer-events: auto;
}

.mega-dropdown-inner {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 18px;
}

.mega-item {
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-decoration: none;
    color: #111111;
    padding: 12px 12px 14px;
    border-radius: 14px;
    transition: background-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
}

.mega-item:hover {
    background-color: #f6f6f8;
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
}

.mega-item-image {
    position: relative;
    width: 100%;
    padding-bottom: 64%;
    border-radius: 14px;
    overflow: hidden;
    background: #f2f2f2;
}

.mega-item-image img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 14px;
    transform: scale(1);
    transition: transform 260ms ease;
}

.mega-item:hover .mega-item-image img {
    transform: scale(1.06);
}

.mega-item-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
}

/* ========== RESPONSIVE (MEGA DROPDOWN) ========== */
@media (max-width: 1024px) {
    .mega-dropdown {
        max-width: 1000px;
        padding-inline: 18px;
    }
    .mega-item-title {
        font-size: 14px;
    }
}

@media (max-width: 768px) {
    .mega-dropdown-inner {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }
}

@media (max-width: 520px) {
    .mega-dropdown-inner {
        grid-template-columns: 1fr;
    }
    .mega-dropdown {
        max-width: calc(100% - 16px);
        margin-inline: 8px;
        border-radius: 14px;
    }
}
    </style>
